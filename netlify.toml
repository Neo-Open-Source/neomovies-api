[build]
  command = "bash ./scripts/build-docs.sh"
  publish = "docs/build"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/v1/*"
  to = "https://api.neomovies.ru/api/v1/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api"
  to = "https://api.neomovies.ru/api"
  status = 200
  force = true
