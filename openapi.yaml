      summary: Get watch progress for user
      operationId: getSyncProgress
      security:
        - bearerAuth: []
      parameters:
        - name: mediaId
          in: query
          required: false
          schema:
            type: string
          description: Filter by media ID (e.g. kp_258687). Returns all if omitted.
      responses:
        "200":
          description: Progress items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SyncProgressItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Favorites]
      summary: Upsert watch progress (last-write-wins by updatedAt)
      operationId: upsertSyncProgress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mediaId, mediaType, progress, duration, status, updatedAt]
              properties:
                mediaId:
                  type: string
                mediaType:
                  type: string
                  enum: [movie, tv]
                season:
                  type: integer
                  nullable: true
                episode:
                  type: integer
                  nullable: true
                progress:
                  type: number
                  format: float
                duration:
                  type: number
                  format: float
                status:
                  type: string
                  enum: [watching, completed, paused, dropped]
                updatedAt:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Upsert result with saved item
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          saved:
                            type: boolean
                          item:
                            $ref: "#/components/schemas/SyncProgressItem"
                            nullable: true
        "400":
          description: Invalid body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Favorites]
      summary: Delete watch progress for a media/episode
