  # ── Auth ──────────────────────────────────────────────────────────────────────
  /api/v1/auth/neo-id/login:
    post:
      tags: [Auth]
      summary: Request Neo ID login URL
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [redirect_url, state]
              properties:
                redirect_url:
                  type: string
                  format: uri
                mobile_redirect_url:
                  type: string
                  description: Optional mobile deep link redirect (for example `neomovies://auth/neo-id/callback`)
                state:
                  type: string
                mode:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Login URL
          content:
            application/json:
              schema:
                type: object
                required: [login_url]
                properties:
                  login_url:
                    type: string
                    format: uri
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Neo ID unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/neo-id/callback:
    post:
      tags: [Auth]
      summary: Exchange Neo ID token for API tokens
      operationId: authCallback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [access_token]
              properties:
                access_token:
                  type: string
      responses:
        "200":
          description: Token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid Neo ID token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/neo-id/mobile-callback:
    get:
      tags: [Auth]
      summary: Mobile redirect trampoline for Neo ID callback
      operationId: authMobileCallback
      parameters:
        - in: query
          name: mobile_redirect_url
          required: true
          schema:
            type: string
          description: Allowed app deep link, e.g. `neomovies://auth/neo-id/callback`
        - in: query
          name: access_token
          required: false
          schema:
            type: string
        - in: query
          name: token
          required: false
          schema:
            type: string
        - in: query
          name: refresh_token
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Redirect to mobile deep link with `access_token` (and optionally `refresh_token`, `state`)
        "400":
          description: Invalid or missing parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT pair
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
