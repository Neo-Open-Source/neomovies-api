          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/sync/progress/batch:
    post:
      tags: [Favorites]
      summary: Batch sync progress (push local + pull server state)
      operationId: batchSyncProgress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [mediaId, mediaType, progress, duration, status, updatedAt]
                    properties:
                      mediaId:
                        type: string
                      mediaType:
                        type: string
                        enum: [movie, tv]
                      season:
                        type: integer
                        nullable: true
                      episode:
                        type: integer
                        nullable: true
                      progress:
                        type: number
                        format: float
                      duration:
                        type: number
                        format: float
                      status:
                        type: string
                        enum: [watching, completed, paused, dropped]
                      updatedAt:
                        type: string
                        format: date-time
      responses:
        "200":
          description: Batch sync result with all current server items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          saved:
                            type: integer
                          items:
                            type: array
                            items:
                              $ref: "#/components/schemas/SyncProgressItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/watch-later/{kp_id}/check:
    get:
